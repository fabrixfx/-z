<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой простой сайт</title>
    <style>
        /* CSS: Отвечает за внешний вид */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
        }
        h1 { color: #333; }
        p { color: #666; line-height: 1.5; }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Привет! 👋</h1>
        <p>Это мой первый сайт, написанный в одном файле. Здесь есть всё: разметка, стили и даже капля магии.</p>
        <button onclick="sayHello()">Нажми на меня</button>
        <p id="message" style="margin-top: 20px; font-weight: bold; color: #28a745;"></p>
    </div>

    <script>
        function sayHello() {
            const msg = document.getElementById('message');
            msg.innerText = "Ура! Оно работает! 🎉";
        }
    </script>

</body>
</html>
